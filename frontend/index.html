<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
        }

        .status-bar .connected {
            color: #4ade80;
        }

        .status-bar .disconnected {
            color: #f87171;
        }

        /* Login Section */
        .login-section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .login-section.hidden {
            display: none;
        }

        .login-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .login-section input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .login-section input[type="text"]::placeholder {
            color: #888;
        }

        .login-section input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
        }

        /* Chat Section */
        .chat-section {
            display: none;
        }

        .chat-section.active {
            display: block;
        }

        .room-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .room-selector input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
        }

        .room-selector input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .chat-container {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .chat-header {
            background: rgba(255,255,255,0.1);
            padding: 15px 20px;
            font-weight: 500;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            word-wrap: break-word;
        }

        .message .meta {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 4px;
        }

        .message .meta .username {
            color: #6366f1;
            font-weight: 500;
        }

        .message .content {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.own {
            align-self: flex-end;
            background: #6366f1;
        }

        .message.own .meta .username {
            color: rgba(255,255,255,0.7);
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: #888;
            font-size: 0.85rem;
            padding: 8px;
        }

        .message-input {
            display: flex;
            gap: 10px;
        }

        .message-input input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
        }

        .message-input input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .btn-round {
            border-radius: 25px;
            padding: 14px 24px;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WebSocket Chat</h1>
            <div class="status-bar">
                <span id="chat-header">Room: general</span>
                <span id="connection-header" class="disconnected">Disconnected</span>
            </div>
        </div>

        <!-- Login Section -->
        <div class="login-section" id="login-section">
            <h2>Enter your username to join</h2>
            <form id="login-form">
                <input type="text" id="username" name="username" placeholder="Username" required>
                <button type="submit" class="btn" style="width: 100%;">Join Chat</button>
            </form>
        </div>

        <!-- Chat Section -->
        <div class="chat-section" id="chat-section">
            <form id="chatroom-selection" class="room-selector">
                <input type="text" id="chatroom" name="chatroom" placeholder="Enter room name (0-9)">
                <button type="submit" class="btn btn-secondary">Change Room</button>
            </form>

            <div class="chat-container">
                <div class="chat-header" id="room-header">Room: general</div>
                <div class="chat-messages" id="chatmessages">
                    <div class="message system">Welcome! Start chatting...</div>
                </div>
            </div>

            <form id="chatroom-message" class="message-input">
                <input type="text" id="message" name="message" placeholder="Type a message..." autocomplete="off">
                <button type="submit" class="btn btn-round">Send</button>
            </form>
        </div>
    </div>

    <script>
        var selectedChat = "general";
        var conn;

        class Event {
            constructor(type, payload){
                this.type = type
                this.payload = payload;
            }
        }

        class SendMessageEvent {
            constructor(message, from) {
                this.message = message;
                this.from = from;
            }
        }

        class NewMessageEvent {
            constructor(message, from, sent) {
                this.message = message;
                this.from = from;
                this.sent = sent;
            }
        }

        class ChangeChatRoomEvent {
            constructor(name) {
                this.name = name;
            }
        }

        function routeEvent(event) {
            if(event.type === undefined){
                alert('no type field in the event');
                return;
            }

            switch(event.type){
                case "new_message":
                    const messageEvent = Object.assign(new NewMessageEvent, event.payload);
                    appendChatMessage(messageEvent);
                    break;
                default:
                    alert("unsupported message type");
                    break;
            }
        }

        function appendChatMessage(messageEvent) {
            const container = document.getElementById('chatmessages');
            const date = new Date(messageEvent.sent);
            const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const isOwn = messageEvent.from === localStorage.getItem('username');

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message' + (isOwn ? ' own' : '');
            msgDiv.innerHTML = `
                <div class="meta">
                    <span class="username">${messageEvent.from}</span> &middot; ${timeStr}
                </div>
                <div class="content">${messageEvent.message}</div>
            `;

            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function appendSystemMessage(text) {
            const container = document.getElementById('chatmessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message system';
            msgDiv.textContent = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function sendEvent(eventName, payload){
            const event = new Event(eventName, payload);
            conn.send(JSON.stringify(event));
        }

        function changeChatroom(){
            var newchat = document.getElementById("chatroom");
            if(newchat != null && newchat.value && newchat.value != selectedChat){
                selectedChat = newchat.value;
                document.getElementById("chat-header").textContent = "Room: " + selectedChat;
                document.getElementById("room-header").textContent = "Room: " + selectedChat;

                let changeEvent = new ChangeChatRoomEvent(selectedChat);
                sendEvent("change_room", changeEvent);

                // Clear messages and show system message
                document.getElementById('chatmessages').innerHTML = '';
                appendSystemMessage(`You joined room: ${selectedChat}`);

                newchat.value = '';
            }
            return false;
        }

        function sendMessage(){
            var newmessage = document.getElementById("message");
            if(newmessage != null && newmessage.value.trim()){
                let outgoingEvent = new SendMessageEvent(newmessage.value, localStorage.getItem('username'));
                sendEvent("send_message", outgoingEvent);
                newmessage.value = '';
            }
            return false;
        }

        function login(){
            const username = document.getElementById("username").value.trim();
            if (!username) return false;

            let formData = {
                "username": username,
            }

            fetch("login", {
                method: 'post',
                body: JSON.stringify(formData),
                mode: "cors"
            }).then((response) => {
                if(response.ok){
                    return response.json();
                }else{
                    throw "unauthorized";
                }
            }).then((data) => {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', username);
                connectWebsocket(data.token);
            }).catch((e) => {
                alert(e);
            })

            return false;
        }

        function connectWebsocket(token){
            if (window["WebSocket"]){
                conn = new WebSocket("ws://" + document.location.host + "/ws?token=" + token);

                conn.onopen = function(evt) {
                    document.getElementById("connection-header").textContent = "Connected";
                    document.getElementById("connection-header").className = "connected";

                    // Show chat, hide login
                    document.getElementById("login-section").classList.add("hidden");
                    document.getElementById("chat-section").classList.add("active");
                }

                conn.onclose = function(evt) {
                    document.getElementById("connection-header").textContent = "Disconnected";
                    document.getElementById("connection-header").className = "disconnected";
                }

                conn.onmessage = function(evt){
                    const eventData = JSON.parse(evt.data);
                    const event = Object.assign(new Event, eventData);
                    routeEvent(event);
                }
            }else{
                alert('Browser does not support websockets');
            }
        }

        window.onload = function() {
            document.getElementById("chatroom-selection").onsubmit = changeChatroom;
            document.getElementById("chatroom-message").onsubmit = sendMessage;
            document.getElementById("login-form").onsubmit = login;
        }
    </script>
</body>
</html>
